paths:
  source_dataset: ./dataset/all
  generated_datasets: ./output
  models: ./models
  results: ./results

processes:
  - index: 1
    dataset:
      input_path: ./dataset/all
      output_path: ./dataset/sahi

    slicing:
      mode: sahi
      tile_size: [640, 640]
      overlap_ratio: 0.1

    crossfolds:
      n_folds: 5
      seed: 42
      ioa_threshold: 0.4
      split_strategy: kfold_holdout
      val_ratio: 0.15
      empty_tile_ratio: 0.08


    inference:
      suppression: nms
      conf_threshold: 0.5
      iou_threshold: 0.5
      batch_size: 32

  - index: 2
    dataset:
      input_path: ./dataset/all
      output_path: ./dataset/asahi

    slicing:
      mode: asahi
      tile_size: [640, 640]
      overlap_ratio: 0.15

    crossfolds:
      n_folds: 5
      seed: 42
      ioa_threshold: 0.4
      split_strategy: kfold_holdout
      val_ratio: 0.15
      empty_tile_ratio: 0.08

    inference:
      suppression: cluster_diou_nms
      conf_threshold: 0.5
      iou_threshold: 0.5
      batch_size: 32

  - index: 3
    dataset:
      input_path: ./dataset/all
      output_path: ./dataset/asahi_rect

    slicing:
      mode: asahi_rect
      tile_size: [640, 640]
      overlap_ratio: 0.15

    crossfolds:
      n_folds: 5
      seed: 42
      ioa_threshold: 0.4
      split_strategy: kfold_holdout
      val_ratio: 0.15
      empty_tile_ratio: 0.08

    inference:
      suppression: cluster_diou_nms
      conf_threshold: 0.5
      iou_threshold: 0.5
      batch_size: 32
